<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medcrew Surgicals — Courier Slip</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
  :root {
    --bg-base:    #0e0a14;
    --bg-card:    rgba(255,255,255,.04);
    --bg-card-h:  rgba(255,255,255,.07);
    --bg-input:   rgba(255,255,255,.05);
    --border:     rgba(255,255,255,.08);
    --border-h:   rgba(255,255,255,.18);
    --border-act: rgba(255,255,255,.30);
    --text:       #f0edf5;
    --muted:      rgba(255,255,255,.45);
    --dim:        rgba(255,255,255,.18);
    --orange:     #e8622a;
    --orange-bg:  rgba(232,98,42,.12);
    --orange-bdr: rgba(232,98,42,.35);
    --green:      #4caf82;
    --green-bg:   rgba(76,175,130,.08);
    --green-bdr:  rgba(76,175,130,.22);
    --red:        #d94f4f;
    --red-bg:     rgba(217,79,79,.10);
    --red-bdr:    rgba(217,79,79,.30);
    --amber:      #f0a500;
    --amber-bg:   rgba(240,165,0,.10);
    --amber-bdr:  rgba(240,165,0,.30);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Outfit', sans-serif;
    background-color: var(--bg-base);
    background-image:
      radial-gradient(ellipse 60% 70% at 0% 50%, #1f0912 0%, transparent 60%),
      radial-gradient(ellipse 55% 70% at 100% 50%, #140723 0%, transparent 60%),
      radial-gradient(ellipse 80% 60% at 50% 100%, #1a0820 0%, transparent 70%);
    background-attachment: fixed;
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* NAV */
  nav {
    border-bottom: 1px solid var(--border);
    padding: 1.1rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    backdrop-filter: blur(8px);
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(14,10,20,0.85);
  }
  .nav-left { display: flex; align-items: center; gap: 14px; }
  .nav-logo {
    width: 40px; height: 40px; border-radius: 10px;
    border: 1px solid var(--border-h);
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: rgba(232,98,42,.1);
  }
  .nav-logo img { height: 28px; width: auto; }
  .nav-brand { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -.01em; }
  .nav-brand span { color: var(--muted); font-weight: 300; }
  .nav-pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--orange);
    background: var(--orange-bg); border: 1px solid var(--orange-bdr);
    padding: 5px 12px; border-radius: 100px;
  }

  /* PAGE */
  .page {
    max-width: 640px;
    margin: 0 auto;
    padding: 4rem 2rem 7rem;
    animation: fadeUp .55s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* HERO */
  .hero { margin-bottom: 3.5rem; }
  .tag {
    display: inline-block; font-size: 11px; font-weight: 700;
    letter-spacing: .14em; text-transform: uppercase;
    color: var(--orange); margin-bottom: 1.2rem;
  }
  .hero h1 {
    font-size: clamp(2.2rem, 6vw, 3.2rem); font-weight: 300;
    line-height: 1.1; letter-spacing: -.025em; color: var(--text);
    margin-bottom: .4rem;
  }
  .hero h1 strong { font-weight: 700; display: block; }
  .hero p {
    font-size: 14px; color: var(--muted); line-height: 1.75;
    max-width: 440px; font-weight: 300; margin-top: 1rem;
  }

  /* SEC LABEL */
  .sec-lbl {
    font-size: 10px; font-weight: 700; letter-spacing: .16em;
    text-transform: uppercase; color: var(--orange);
    margin-bottom: 1rem;
    display: flex; align-items: center; gap: 8px;
  }
  .sec-lbl::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(to right, var(--orange-bdr), transparent);
  }

  /* CARD */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px;
    margin-bottom: 1.2rem;
    backdrop-filter: blur(6px);
    transition: border-color .2s;
  }
  .card:hover { border-color: var(--border-h); }
  .card.active-card { border-color: var(--orange-bdr); }

  /* FORM */
  .fl { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .fl:last-child { margin-bottom: 0; }
  .fl label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .1em; color: var(--dim);
  }
  .fl input, .fl textarea {
    font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500;
    padding: 10px 14px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text); width: 100%;
    transition: border-color .2s, box-shadow .2s;
  }
  .fl input::placeholder, .fl textarea::placeholder { color: rgba(255,255,255,.2); }
  .fl input:focus, .fl textarea:focus {
    outline: none; border-color: var(--orange-bdr);
    box-shadow: 0 0 0 3px rgba(232,98,42,.1);
    background: rgba(255,255,255,.06);
  }
  .fl input[readonly] {
    background: rgba(255,255,255,.02); color: var(--muted);
    cursor: not-allowed; border-color: rgba(255,255,255,.05);
  }
  .fl textarea { resize: none; height: 64px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  /* PIN ROW */
  .pin-wrap { display: flex; gap: 8px; }
  .pin-wrap input { flex: 1; }
  .pin-btn {
    padding: 10px 16px; font-family: 'Outfit', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
    background: var(--orange); color: #fff;
    border: none; border-radius: 8px;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: opacity .2s, transform .15s;
  }
  .pin-btn:hover { opacity: .85; transform: translateY(-1px); }
  .pin-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .pin-msg {
    font-size: 11px; font-weight: 500; min-height: 16px; margin-top: 4px;
    font-family: 'DM Mono', monospace;
  }
  .ok      { color: var(--green); }
  .err     { color: var(--red); }
  .loading { color: var(--orange); }

  /* ACTIONS */
  #form-actions { display: flex; gap: 12px; margin-top: 4px; }
  .btn-gen {
    flex: 1; padding: 14px;
    background: var(--orange); color: #fff;
    border: none; border-radius: 10px;
    font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
    letter-spacing: .02em; cursor: pointer;
    transition: opacity .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 4px 20px rgba(232,98,42,.3);
  }
  .btn-gen:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 6px 24px rgba(232,98,42,.4); }
  .btn-clr {
    padding: 14px 22px;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: border-color .2s, color .2s;
  }
  .btn-clr:hover { border-color: var(--border-h); color: var(--text); }

  /* SLIP SECTION */
  #slip-section { display: none; }

  .slip-wrap {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 16px;
    backdrop-filter: blur(6px);
  }

  .slip-label {
    background: #fff;
    border: 2px solid #1a1a2e;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    overflow: hidden;
    color: #111;
  }

  /* SHIP TO */
  .sl-to-section {
    padding: 16px 18px 14px;
    border-bottom: 2px solid #e0e0e0;
  }
  .sl-kw {
    font-size: 8px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .22em; color: #aaa;
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .sl-kw::after { content: ''; flex: 1; height: 1px; background: #ebebeb; }

  .sl-to-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px; letter-spacing: 1.5px;
    color: #080f22; line-height: 1; margin-bottom: 10px;
    word-break: break-word;
  }
  .sl-addr-grid {
    display: grid; grid-template-columns: 1fr auto;
    gap: 10px 16px; align-items: start;
  }
  .sl-addr-text {
    font-size: 13px; font-weight: 500; color: #333; line-height: 1.75;
  }
  .sl-addr-text .city-line { font-weight: 700; color: #111; font-size: 13.5px; }

  .sl-pin-box {
    border: 1.5px solid #0a1628; border-radius: 6px;
    padding: 8px 14px; text-align: center; min-width: 108px; flex-shrink: 0;
  }
  .sl-pin-label {
    font-size: 7px; font-weight: 800; letter-spacing: .2em;
    color: #888; text-transform: uppercase; margin-bottom: 2px;
  }
  .sl-pin-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px; letter-spacing: 3px; color: #080f22; line-height: 1;
  }

  .sl-mob-row {
    margin-top: 10px; padding-top: 8px; border-top: 1px dashed #ddd;
    display: flex; align-items: center; gap: 8px;
  }
  .sl-mob-tag {
    font-size: 8px; font-weight: 800; letter-spacing: .15em;
    color: #fff; background: #0a1628;
    padding: 3px 8px; border-radius: 3px; text-transform: uppercase;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .sl-mob-num {
    font-family: 'DM Mono', monospace;
    font-size: 13.5px; font-weight: 600; color: #111; letter-spacing: .05em;
  }

  /* FROM */
  .sl-from-section {
    padding: 12px 18px 16px;
    background: #f7f6fb;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }
  .sl-from-name { font-size: 13px; font-weight: 800; color: #0a1628; margin-bottom: 3px; }
  .sl-from-addr { font-size: 11.5px; color: #555; line-height: 1.65; }
  .sl-from-mob {
    font-size: 11.5px; font-weight: 600; color: #333;
    font-family: 'DM Mono', monospace; margin-top: 3px;
  }

  /* SLIP ACTIONS */
  .slip-actions { display: flex; gap: 10px; margin-bottom: 10px; }
  .btn-print {
    flex: 1; padding: 14px;
    background: var(--green-bg); color: var(--green);
    border: 1px solid var(--green-bdr); border-radius: 10px;
    font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity .2s, background .2s;
  }
  .btn-print:hover { opacity: .85; background: rgba(76,175,130,.14); }
  .btn-new {
    width: 100%; padding: 13px;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: 10px;
    font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: border-color .2s, color .2s;
  }
  .btn-new:hover { color: var(--text); border-color: var(--border-h); }

  #sender-card { display: none; }

  /* PRINT */
  @media print {
    @page { margin: 8mm; size: A5; }
    body { background: #fff !important; }
    #form-area, #form-actions, .slip-actions, .btn-new, nav { display: none !important; }
    .page { max-width: 100% !important; padding: 0 !important; margin: 0 !important; }
    #slip-section { display: block !important; }
    .sec-lbl { display: none !important; }
    .slip-wrap {
      background: #fff !important; border: none !important;
      box-shadow: none !important; padding: 0 !important; margin: 0 !important;
    }
    .slip-label { border: 1.5px solid #111 !important; width: 100% !important; }
    .sl-mob-tag { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: #0a1628 !important; }
    .sl-from-section { -webkit-print-color-adjust: exact; print-color-adjust: exact; background: #f7f6fb !important; }
    .hero { display: none !important; }
  }

  @media (max-width: 560px) {
    nav { padding: 1rem 1.2rem; }
    .page { padding: 2.5rem 1.2rem 5rem; }
    .row3 { grid-template-columns: 1fr; }
    .sl-to-name { font-size: 28px; }
    .sl-addr-grid { grid-template-columns: 1fr; }
    .sl-pin-box { width: 100%; }
    #form-actions { flex-direction: column; }
    .btn-clr { text-align: center; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <div class="nav-logo">
      <img src="https://medcrewsurgicals.in/img/ms.gif" alt="MS">
    </div>
    <div class="nav-brand">Medcrew Surgicals <span>/ courier</span></div>
  </div>
  <div class="nav-pill"><i class="fa fa-box" style="font-size:9px"></i> Internal Tool</div>
</nav>

<!-- PAGE -->
<div class="page">

  <!-- HERO -->
  <div class="hero" id="hero-block">
    <div class="tag">Dispatch Tool</div>
    <h1>
      Generate courier
      <strong>slip instantly.</strong>
    </h1>
    <p>Fill in the receiver's address, auto-fetch city & state from PIN, and print a clean shipping label in seconds.</p>
  </div>

  <!-- FORM -->
  <div id="form-area">
    <div class="sec-lbl">Receiver Details</div>
    <div class="card active-card">
      <div class="fl">
        <label>Company / Receiver Name</label>
        <input type="text" id="r-name" placeholder="e.g. Apollo Hospital Supplies" autofocus>
      </div>
      <div class="fl">
        <label>Mobile Number</label>
        <input type="text" id="r-mobile" maxlength="10" placeholder="10-digit mobile">
      </div>
      <div class="fl">
        <label>Street / Building Address</label>
        <textarea id="r-addr" placeholder="Shop No., Street, Area..."></textarea>
      </div>
      <div class="fl">
        <label>PIN Code</label>
        <div class="pin-wrap">
          <input type="text" id="r-pin" maxlength="6" placeholder="6-digit PIN"
            oninput="this.value=this.value.replace(/\D/g,'');if(this.value.length===6)lookupPin('r')">
          <button class="pin-btn" id="r-btn" onclick="lookupPin('r')">
            <i class="fa fa-search"></i> Search
          </button>
        </div>
        <div class="pin-msg" id="r-msg"></div>
      </div>
      <div class="row3">
        <div class="fl"><label>City / PO</label><input type="text" id="r-city" readonly placeholder="Auto-filled"></div>
        <div class="fl"><label>District</label><input type="text" id="r-dist" readonly placeholder="Auto-filled"></div>
        <div class="fl"><label>State</label><input type="text" id="r-state" readonly placeholder="Auto-filled"></div>
      </div>
    </div>
  </div>

  <!-- hidden sender fields -->
  <div id="sender-card">
    <input type="text" id="s-name">
    <input type="text" id="s-mobile">
    <textarea id="s-addr"></textarea>
    <input type="text" id="s-pin">
    <input type="text" id="s-city">
    <input type="text" id="s-dist">
    <input type="text" id="s-state">
  </div>

  <!-- ACTIONS -->
  <div id="form-actions">
    <button class="btn-gen" onclick="generateSlip()">
      <i class="fa fa-file-alt"></i> &nbsp;Generate Courier Slip
    </button>
    <button class="btn-clr" onclick="clearAll()">Clear</button>
  </div>

  <!-- SLIP OUTPUT -->
  <div id="slip-section">
    <div class="sec-lbl">Shipping Label</div>
    <div class="slip-wrap">
      <div class="slip-label">

        <!-- SHIP TO -->
        <div class="sl-to-section">
          <div class="sl-kw">Ship To</div>
          <div class="sl-to-name" id="sl-dest"></div>
          <div class="sl-addr-grid">
            <div class="sl-addr-text">
              <div id="sl-r-street"></div>
              <div id="sl-r-area"></div>
              <div class="city-line" id="sl-r-city-st"></div>
            </div>
            <div class="sl-pin-box">
              <div class="sl-pin-label">PIN Code</div>
              <div class="sl-pin-val" id="sl-r-pin"></div>
            </div>
          </div>
          <div class="sl-mob-row" id="sl-mob-row">
            <span class="sl-mob-tag">MOB</span>
            <span class="sl-mob-num" id="sl-r-mob"></span>
          </div>
        </div>

        <!-- FROM -->
        <div class="sl-from-section">
          <div class="sl-kw">From</div>
          <div class="sl-from-name" id="sl-s-name"></div>
          <div class="sl-from-addr" id="sl-s-addr"></div>
          <div class="sl-from-mob"  id="sl-s-mob"></div>
        </div>

      </div>
    </div>

    <!-- SLIP ACTIONS -->
    <div class="slip-actions">
      <button class="btn-print" onclick="window.print()">
        <i class="fa fa-print"></i> &nbsp;Save / Print PDF
      </button>
    </div>
    <button class="btn-new" onclick="clearAll()">
      <i class="fa fa-arrow-left"></i> &nbsp;Create New Slip
    </button>
  </div>

</div>

<script>
async function lookupPin(side) {
  const pinEl = document.getElementById(side + '-pin');
  const pin   = pinEl.value.trim();
  const msg   = document.getElementById(side + '-msg');
  const btn   = document.getElementById(side + '-btn');

  if (!/^\d{6}$/.test(pin)) {
    if (msg) { msg.className = 'pin-msg err'; msg.textContent = 'Enter a valid 6-digit PIN code.'; }
    return;
  }
  if (msg) { msg.className = 'pin-msg loading'; msg.textContent = '⟳  Searching…'; }
  if (btn) btn.disabled = true;
  ['city','dist','state'].forEach(f => { const el = document.getElementById(side+'-'+f); if(el) el.value = ''; });

  try {
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 8000);
    const res  = await fetch('https://api.postalpincode.in/pincode/' + pin, { signal: ctrl.signal });
    clearTimeout(t);
    const data = await res.json();
    if (data?.[0]?.Status === 'Success' && data[0].PostOffice?.length > 0) {
      const po = data[0].PostOffice[0];
      document.getElementById(side+'-city').value  = po.Name     || '';
      document.getElementById(side+'-dist').value  = po.District || '';
      document.getElementById(side+'-state').value = po.State    || '';
      if (msg) {
        msg.className = 'pin-msg ok';
        const ct = data[0].PostOffice.length;
        msg.textContent = '✓  ' + po.Name + ', ' + po.District + ', ' + po.State +
          (ct > 1 ? '  (' + ct + ' post offices)' : '');
      }
    } else { manualEntry(side, msg); }
  } catch { manualEntry(side, msg); }
  if (btn) btn.disabled = false;
}

function manualEntry(side, msg) {
  ['city','dist','state'].forEach(f => {
    const el = document.getElementById(side+'-'+f);
    if (el) {
      el.removeAttribute('readonly');
      el.style.background  = 'rgba(240,165,0,0.06)';
      el.style.borderColor = 'rgba(240,165,0,0.4)';
      el.placeholder = 'Enter manually';
    }
  });
  if (msg) { msg.className = 'pin-msg err'; msg.textContent = '⚠  Auto-fetch failed. Fill manually.'; }
}

function g(id) { return (document.getElementById(id)?.value || '').trim(); }

function generateSlip() {
  const rName = g('r-name'), rMob  = g('r-mobile');
  const rAddr = g('r-addr'), rPin  = g('r-pin');
  const rCity = g('r-city'), rDist = g('r-dist'), rSt = g('r-state');
  const sName = g('s-name'), sMob  = g('s-mobile');
  const sAddr = g('s-addr'), sPin  = g('s-pin');
  const sCity = g('s-city'), sDist = g('s-dist'), sSt = g('s-state');

  if (!rName) { alert('Please enter Receiver Name.'); document.getElementById('r-name').focus(); return; }
  if (!rPin)  { alert('Please enter Receiver PIN Code.'); document.getElementById('r-pin').focus(); return; }
  if (!sName) { alert('Sender name is missing.'); return; }

  document.getElementById('sl-dest').textContent      = rName.toUpperCase();
  document.getElementById('sl-r-street').textContent  = rAddr || '';
  document.getElementById('sl-r-area').textContent    = rDist || '';
  document.getElementById('sl-r-city-st').textContent = [rCity, rSt].filter(Boolean).join(', ');
  document.getElementById('sl-r-pin').textContent     = rPin;

  const mobRow = document.getElementById('sl-mob-row');
  if (rMob) {
    document.getElementById('sl-r-mob').textContent = '+91 ' + rMob;
    mobRow.style.display = 'flex';
  } else {
    mobRow.style.display = 'none';
  }

  document.getElementById('sl-s-name').textContent = sName;
  document.getElementById('sl-s-addr').textContent = [sAddr, sCity, sDist, sSt, 'PIN: ' + sPin].filter(Boolean).join(', ');
  document.getElementById('sl-s-mob').textContent  = sMob || '';

  document.getElementById('form-area').style.display    = 'none';
  document.getElementById('form-actions').style.display = 'none';
  document.getElementById('hero-block').style.display   = 'none';
  document.getElementById('slip-section').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function clearAll() {
  ['r-name','r-mobile','r-addr','r-pin'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  ['r'].forEach(side => {
    ['city','dist','state'].forEach(f => {
      const el = document.getElementById(side+'-'+f);
      if (el) {
        el.value = ''; el.setAttribute('readonly','');
        el.style.background = ''; el.style.borderColor = '';
        el.placeholder = 'Auto-filled';
      }
    });
    const msg = document.getElementById(side+'-msg');
    if (msg) msg.textContent = '';
  });
  document.getElementById('slip-section').style.display  = 'none';
  document.getElementById('form-area').style.display     = 'block';
